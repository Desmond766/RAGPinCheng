# Production compose for the PinCheng RAG system.
#
# Two services: qdrant (vector store) and backend (FastAPI + React bundle in
# one image). The backend serves both /api/* and the React SPA at / — no
# separate frontend container or nginx proxy.
#
# Run all commands from the repo root:
#   docker compose -f docker/docker-compose.yml build
#   docker compose -f docker/docker-compose.yml up -d
#   docker compose -f docker/docker-compose.yml logs -f backend
#   docker compose -f docker/docker-compose.yml exec backend python scripts/build_index.py
#   docker compose -f docker/docker-compose.yml down
#
# Env wiring: the repo-root `.env` is the single source of truth. `docker/.env`
# is a symlink to it, so compose-time substitution (e.g. ${BUILD_PLATFORM})
# resolves; the backend also loads it via `env_file:` for container runtime
# injection. Required keys: ZHIPU_API_KEY, MINERU_API_KEY, ADMIN_EMPLOYEE_ID,
# ADMIN_PASSWORD, (optional) LLM_MODEL, LLM_REWRITE_MODEL, HF_ENDPOINT.

services:
  qdrant:
    image: qdrant/qdrant:latest
    restart: unless-stopped
    volumes:
      # Persistent index storage. Separate from the `data` bind mount so the
      # Qdrant server fully owns its on-disk format and can be upgraded
      # independently. Survives `docker compose down`; only removed with `-v`.
      - qdrant_storage:/qdrant/storage
    # No `ports:` — only the backend talks to Qdrant, and it does so over the
    # compose network. Uncomment to expose the dashboard at :6333 for debugging:
    # ports:
    #   - "6333:6333"
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/6333'"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
      # Target architecture is parameterized — defaults to amd64 (production
      # server). Override per-invocation for local Mac testing:
      #     BUILD_PLATFORM=linux/arm64 docker compose -f docker/docker-compose.yml build
      # Or set it in .env to make it sticky for one machine.
      platforms:
        - ${BUILD_PLATFORM:-linux/amd64}
    image: pincheng-rag-backend:latest
    restart: unless-stopped
    depends_on:
      qdrant:
        condition: service_healthy
    env_file:
      # Injects all keys from the repo-root .env into the container so we don't
      # have to enumerate them in `environment:`. Code defaults in
      # src/config.py and api/auth.py cover any keys missing from .env.
      - ../.env
    environment:
      # In-cluster Qdrant — the backend reaches it by compose service name.
      # Forced literal (not ${QDRANT_URL}) so a host-side .env that points
      # to http://localhost:6333 for local scripts cannot leak in and break
      # the container's connection to the qdrant service.
      QDRANT_URL: http://qdrant:6333
    volumes:
      # Persistent state — parsed markdown cache, parents.sqlite, app.sqlite
      # (users + conversations), feedback.jsonl. Lives on the host disk;
      # the image stays stateless. Qdrant has its own volume above.
      - ../data:/app/data
      # Source PDFs — needed only when running scripts/build_index.py inside
      # the container. Mounted read-write so MinerU can drop split PDFs back
      # alongside originals if needed.
      - ../docs:/app/docs
      # HuggingFace model cache — separate named volume so first-boot
      # downloads of BGE-M3 + reranker (~3 GB) survive container recreation.
      - hf_cache:/root/.cache/huggingface
    ports:
      # Publicly exposed entry point. Maps host :80 to the container's
      # uvicorn on :8000 — same URL as the old nginx setup, just one fewer
      # hop. Put a company reverse proxy / TLS terminator in front for HTTPS.
      - "80:8000"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      # Long start_period: first container start downloads ~3 GB of model
      # weights into hf_cache before /api/health is reachable. Subsequent
      # restarts complete in seconds.
      start_period: 15m
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

volumes:
  hf_cache:
    # Survives `docker compose down`; only removed with `docker compose down -v`.
  qdrant_storage:
    # Persistent Qdrant index. Survives `docker compose down`; only removed
    # with `docker compose down -v`. To inspect contents, exec into the
    # qdrant container — do NOT touch the files from the host while the
    # container is running.

# -----------------------------------------------------------------------------
# Build cheat-sheet
# -----------------------------------------------------------------------------
# Build for the production server (default, x86_64):
#     docker compose -f docker/docker-compose.yml build
#
# Build natively on an Apple Silicon Mac for fast local testing:
#     BUILD_PLATFORM=linux/arm64 docker compose -f docker/docker-compose.yml build
#
# Make the override sticky for one machine — add to .env:
#     BUILD_PLATFORM=linux/arm64
