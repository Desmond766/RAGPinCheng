# Production compose for the PinCheng RAG system.
#
# Run all commands from the repo root:
#   docker compose -f docker/docker-compose.yml build
#   docker compose -f docker/docker-compose.yml up -d
#   docker compose -f docker/docker-compose.yml logs -f backend
#   docker compose -f docker/docker-compose.yml exec backend python scripts/build_index.py
#   docker compose -f docker/docker-compose.yml down
#
# Secrets: docker compose auto-loads `.env` from the directory where the command
# is run (repo root). Required keys: ZHIPU_API_KEY, MINERU_API_KEY,
# (optional) LLM_MODEL, LLM_REWRITE_MODEL, HF_ENDPOINT.

services:
  qdrant:
    image: qdrant/qdrant:latest
    restart: unless-stopped
    volumes:
      # Persistent index storage. Separate from the `data` bind mount so the
      # Qdrant server fully owns its on-disk format and can be upgraded
      # independently. Survives `docker compose down`; only removed with `-v`.
      - qdrant_storage:/qdrant/storage
    # No `ports:` — only the backend talks to Qdrant, and it does so over the
    # compose network. Uncomment to expose the dashboard at :6333 for debugging:
    # ports:
    #   - "6333:6333"
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/6333'"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
      # Target architecture is parameterized — defaults to amd64 (production
      # server). Override per-invocation for local Mac testing:
      #     BUILD_PLATFORM=linux/arm64 docker compose -f docker/docker-compose.yml build
      # Or set it in .env to make it sticky for one machine.
      # For a true multi-arch image (both arches in one manifest), use buildx
      # directly: see comments at the bottom of this file.
      platforms:
        - ${BUILD_PLATFORM:-linux/amd64}
    image: pincheng-rag-backend:latest
    restart: unless-stopped
    depends_on:
      qdrant:
        condition: service_healthy
    environment:
      # Secrets / model config — passed through from the host .env file.
      ZHIPU_API_KEY: ${ZHIPU_API_KEY}
      MINERU_API_KEY: ${MINERU_API_KEY}
      LLM_MODEL: ${LLM_MODEL:-glm-4.7-flashx}
      # Optional rewrite-specific model. If unset, src/config.py defaults to
      # glm-4.5-air — the cheap/fast model used for the standalone-query rewrite.
      LLM_REWRITE_MODEL: ${LLM_REWRITE_MODEL:-}
      # HuggingFace endpoint. Defaults to the real CDN; override in .env with
      #   HF_ENDPOINT=https://hf-mirror.com
      # if the server can't reach huggingface.co directly (common on restricted
      # networks in mainland China). FlagEmbedding + huggingface_hub honor this
      # env var transparently — no code change required.
      HF_ENDPOINT: ${HF_ENDPOINT:-https://huggingface.co}
      # In-cluster Qdrant — the backend reaches it by compose service name.
      QDRANT_URL: ${QDRANT_URL:-http://qdrant:6333}
      # Frontend is same-origin via nginx proxy, so the in-app CORS list is
      # unused in prod. Leave empty to deny browser cross-origin entirely.
      API_CORS_ORIGINS: ${API_CORS_ORIGINS:-}
    volumes:
      # Persistent state — index, parsed markdown, SQLite parent store,
      # feedback log. Lives on the host disk; the image stays stateless.
      - ../data:/app/data
      # Source PDFs — needed only when running scripts/build_index.py inside
      # the container. Mounted read-write so MinerU can drop split PDFs back
      # alongside originals if needed.
      - ../docs:/app/docs
      # HuggingFace model cache — separate named volume so first-boot
      # downloads of BGE-M3 + reranker (~3 GB) survive container recreation.
      - hf_cache:/root/.cache/huggingface
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      # Long start_period: first container start downloads ~3 GB of model
      # weights into hf_cache before /api/health is reachable. Subsequent
      # restarts complete in seconds.
      start_period: 15m
    # Not exposed to the host — frontend reaches it over the compose network.
    expose:
      - "8000"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
      platforms:
        - ${BUILD_PLATFORM:-linux/amd64}
    image: pincheng-rag-frontend:latest
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_started
    ports:
      # Publicly exposed entry point. Put a company reverse proxy / TLS
      # terminator in front of this for HTTPS.
      - "80:80"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:80/"]
      interval: 30s
      timeout: 5s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

volumes:
  hf_cache:
    # Survives `docker compose down`; only removed with `docker compose down -v`.
  qdrant_storage:
    # Persistent Qdrant index. Survives `docker compose down`; only removed
    # with `docker compose down -v`. To inspect contents, exec into the
    # qdrant container — do NOT touch the files from the host while the
    # container is running.

# -----------------------------------------------------------------------------
# Build cheat-sheet
# -----------------------------------------------------------------------------
# Build for the production server (default, x86_64):
#     docker compose -f docker/docker-compose.yml build
#
# Build natively on an Apple Silicon Mac for fast local testing:
#     BUILD_PLATFORM=linux/arm64 docker compose -f docker/docker-compose.yml build
#
# Make the override sticky for one machine — add to .env:
#     BUILD_PLATFORM=linux/arm64
#
# Build a true multi-arch image (single manifest containing both arches):
#     docker buildx build --platform linux/amd64,linux/arm64 \
#         -f docker/Dockerfile.backend -t pincheng-rag-backend:latest --push .
#     docker buildx build --platform linux/amd64,linux/arm64 \
#         -f docker/Dockerfile.frontend -t pincheng-rag-frontend:latest --push .
# (Multi-arch builds require pushing to a registry — local Docker engine can
# only hold one arch per image tag at a time.)
