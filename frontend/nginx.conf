# Nginx config for the frontend container.
#
# Responsibilities:
#   1. Serve the built React/Vite assets from /usr/share/nginx/html.
#   2. SPA fallback — unknown paths return index.html so client-side routing
#      works on hard refresh.
#   3. Reverse-proxy /api/* to the backend container, with settings tuned for
#      Server-Sent Events (proxy_buffering off + long read timeout).

upstream backend {
    # `backend` resolves to the FastAPI service over the compose-managed
    # docker network. Hardcoded port matches Dockerfile.backend's EXPOSE.
    server backend:8000;
}

server {
    listen 80;
    server_name _;

    # Reasonable client body limit — feedback payloads are small, but leave
    # headroom for future upload features.
    client_max_body_size 10m;

    # Static React/Vite bundle.
    root /usr/share/nginx/html;
    index index.html;

    # Long-cache hashed assets; never-cache the entry HTML so deploys take
    # effect on next reload.
    location /assets/ {
        try_files $uri =404;
        expires 1y;
        access_log off;
        add_header Cache-Control "public, immutable";
    }

    location = /index.html {
        add_header Cache-Control "no-store";
    }

    # SPA routing — unknown paths fall through to index.html (must come after
    # the /api/ block below, but order between this and /assets/ doesn't matter
    # because /assets/ is more specific).
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ---- API + SSE passthrough -------------------------------------------
    # The /sessions/{id}/chat endpoint streams tokens. nginx will otherwise
    # buffer the whole response before sending it; that breaks streaming.
    location /api/ {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE-critical: don't buffer, don't compress, keep the connection open.
        proxy_buffering off;
        proxy_cache off;
        gzip off;
        chunked_transfer_encoding on;
        proxy_set_header Connection "";

        # Generation can take a while for long answers; default 60s would cut
        # mid-stream. 10 min is plenty even for big context turns.
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }
}
